{{ define "main" }}
<div class="diag-page">
    <h2 class="diag-title">配图替换</h2>
    <p class="diag-desc">提交后进入异步队列，下次调度时自动应用。</p>

    <form id="diag-form" class="diag-form">
        <div class="diag-field">
            <label for="diag-secret">令牌</label>
            <input type="password" id="diag-secret" name="secret" autocomplete="off" required>
            <small class="diag-hint">仅本次提交使用，不存储。</small>
        </div>

        <div class="diag-field">
            <label for="diag-whisper-id">动态</label>
            <input type="text" id="diag-whisper-id" name="whisper_id"
                   placeholder="可粘贴动态链接、路径或 ID" required autocomplete="off">
            <small id="diag-whisper-parsed" class="diag-hint diag-parsed" hidden></small>
        </div>

        <div class="diag-field">
            <label for="diag-seq">图片序号</label>
            <input type="number" id="diag-seq" name="seq" min="1" max="9" value="1" required>
            <small class="diag-hint">替换第几张图，默认 1。</small>
        </div>

        <div class="diag-field">
            <label for="diag-image">图片文件</label>
            <input type="file" id="diag-image" name="image" accept="image/png,image/jpeg,image/webp,image/gif" required>
            <small class="diag-hint">支持 png/jpg/webp/gif，上传前自动压缩为 WebP（最大边 1024px）。</small>
        </div>

        <div id="diag-preview" class="diag-preview" hidden>
            <span class="diag-preview-label">预览（已压缩为 WebP）：</span>
            <img id="diag-preview-img" alt="预览">
            <small id="diag-compress-info" class="diag-hint"></small>
        </div>

        <button type="submit" id="diag-submit" class="diag-submit">提交</button>

        <div id="diag-progress" class="diag-progress" hidden>
            <div class="diag-progress-bar"><div id="diag-progress-fill"></div></div>
            <span id="diag-progress-text" class="diag-hint">0%</span>
        </div>
    </form>

    <div id="diag-status" class="diag-status" hidden></div>
</div>

<style>
.diag-page {
    max-width: 640px;
    margin: 2rem auto;
    padding: 1.5rem;
    background: var(--bg, #fff);
    border: 1px solid var(--border, #eee);
    border-radius: var(--radius, 8px);
}
.diag-title {
    margin: 0 0 0.5rem 0;
    font-size: 1.4rem;
}
.diag-desc {
    margin: 0 0 1.5rem 0;
    color: var(--text-muted, #888);
    font-size: 0.9rem;
    line-height: 1.5;
}
.diag-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}
.diag-field {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}
.diag-field label {
    font-weight: 600;
    font-size: 0.95rem;
}
.diag-field input[type="text"],
.diag-field input[type="password"],
.diag-field input[type="number"],
.diag-field input[type="file"] {
    padding: 0.5rem 0.7rem;
    border: 1px solid var(--border, #ddd);
    border-radius: 6px;
    font-size: 0.95rem;
    background: var(--bg-input, #fff);
    color: var(--text, #333);
}
.diag-hint {
    color: var(--text-muted, #999);
    font-size: 0.8rem;
}
.diag-parsed {
    color: #1e7e34;
}
.diag-parsed.err {
    color: #bd2130;
}
.diag-preview {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}
.diag-preview-img {
    max-width: 100%;
    max-height: 280px;
    border-radius: 6px;
    border: 1px solid var(--border, #eee);
}
.diag-submit {
    padding: 0.7rem 1.2rem;
    background: #0066cc;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s;
}
.diag-submit:hover {
    background: #0052a3;
}
.diag-submit:disabled {
    background: #999;
    cursor: not-allowed;
}
.diag-progress {
    display: flex;
    align-items: center;
    gap: 0.6rem;
}
.diag-progress-bar {
    flex: 1;
    height: 8px;
    background: var(--border, #eee);
    border-radius: 4px;
    overflow: hidden;
}
#diag-progress-fill {
    height: 100%;
    width: 0%;
    background: #0066cc;
    transition: width 0.15s;
}
@media (prefers-color-scheme: dark) {
    #diag-progress-fill { background: #2c7fd6; }
}
.diag-status {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    border-radius: 6px;
    font-size: 0.9rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
}
.diag-status.ok {
    background: rgba(40, 167, 69, 0.1);
    border: 1px solid rgba(40, 167, 69, 0.3);
    color: #1e7e34;
}
.diag-status.err {
    background: rgba(220, 53, 69, 0.1);
    border: 1px solid rgba(220, 53, 69, 0.3);
    color: #bd2130;
}
@media (prefers-color-scheme: dark) {
    .diag-submit { background: #2c7fd6; }
    .diag-status.ok { color: #6fdc8c; }
    .diag-status.err { color: #ff6b7d; }
    .diag-parsed { color: #6fdc8c; }
    .diag-parsed.err { color: #ff6b7d; }
}
</style>

<script>
(function() {
    const form = document.getElementById('diag-form');
    const whisperInput = document.getElementById('diag-whisper-id');
    const parsedHint = document.getElementById('diag-whisper-parsed');
    const fileInput = document.getElementById('diag-image');
    const previewBox = document.getElementById('diag-preview');
    const previewImg = document.getElementById('diag-preview-img');
    const submitBtn = document.getElementById('diag-submit');
    const statusBox = document.getElementById('diag-status');
    const compressInfo = document.getElementById('diag-compress-info');
    const progressBox = document.getElementById('diag-progress');
    const progressFill = document.getElementById('diag-progress-fill');
    const progressText = document.getElementById('diag-progress-text');
    // 压缩后的 webp blob，由 fileInput change 事件填充，submit 时读取
    let compressedBlob = null;

    // 将图片压缩为 WebP blob，与 runner 实际存储尺寸对齐：
    // CF flux-2 输出固定 1024×768，runner 调 process_image.py 时走默认
    // max_size=1200，但 1024<1200 所以不缩放，最终存的就是 1024×768。
    // 前端压缩用最大边 1024（不放大）、质量从 0.8 起自适应下调至
    // <=1.8MB，既减小上传压力又不改变最终结果质量。
    function loadImg(file) {
        return new Promise((resolve, reject) => {
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
            img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('图片读取失败')); };
            img.src = url;
        });
    }

    async function compressToWebp(file, maxDim = 1024) {
        const img = await loadImg(file);
        let w = img.naturalWidth, h = img.naturalHeight;
        // 等比缩放，最大边不超过 maxDim，小图不放大（与 process_image.py 一致）
        if (Math.max(w, h) > maxDim) {
            const r = maxDim / Math.max(w, h);
            w = Math.max(1, Math.round(w * r));
            h = Math.max(1, Math.round(h * r));
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        // 质量自适应：0.8 → 0.7 → ... → 0.5，直到 <=1.8MB
        const MAX_BYTES = 1.8 * 1024 * 1024;
        for (let q = 0.8; q >= 0.5; q -= 0.1) {
            const blob = await new Promise(r => canvas.toBlob(r, 'image/webp', q));
            if (blob && blob.size <= MAX_BYTES) return { blob, width: w, height: h, quality: q };
        }
        // 兜底：最低质量
        const blob = await new Promise(r => canvas.toBlob(r, 'image/webp', 0.5));
        return { blob, width: w, height: h, quality: 0.5 };
    }

    function fmtSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1024 / 1024).toFixed(2) + ' MB';
    }

    // 匹配 YYYY-MM-DD-slug 格式（最终目标格式）
    const ID_RE = /^(\d{4})-(\d{2})-(\d{2})-(.+)$/;

    function showStatus(msg, isOk) {
        statusBox.hidden = false;
        statusBox.textContent = msg;
        statusBox.className = 'diag-status ' + (isOk ? 'ok' : 'err');
    }

    // 从任意输入提取动态 ID（YYYY-MM-DD-slug）
    // 支持：
    //   - https://xxx.org/2026/06/28/nuonuo-0cd4cf/
    //   - /2026/06/28/nuonuo-0cd4cf/
    //   - 2026/06/28/nuonuo-0cd4cf
    //   - 2026-06-28-nuonuo-0cd4cf  （已是目标格式）
    function parseWhisperId(input) {
        const s = input.trim();
        if (!s) return { ok: false, value: '', msg: '' };

        // 已是目标格式
        if (ID_RE.test(s)) {
            return { ok: true, value: s, msg: '识别：' + s };
        }

        // 尝试从路径里抓 YYYY/MM/DD-slug 或 YYYY/MM/DD/slug
        // 统一把 / 转成 - 处理，但要避免误伤
        // 先把 URL 的协议/域名去掉
        let path = s;
        try {
            if (/^https?:\/\//.test(s)) {
                const u = new URL(s);
                path = u.pathname;
            }
        } catch (e) { /* 不是合法 URL，按裸路径处理 */ }

        // 去掉首尾空白和斜杠
        path = path.replace(/^\/+|\/+$/g, '');

        // 匹配 YYYY/MM/DD/slug（分隔符可能是 / 或 -）
        // 取路径前 4 段
        const segs = path.split(/[\/]+/);
        if (segs.length >= 4) {
            const y = segs[0], m = segs[1], d = segs[2];
            // slug 可能含 -，所以第 4 段及之后全部拼回
            const slug = segs.slice(3).join('/');
            if (/^\d{4}$/.test(y) && /^\d{2}$/.test(m) && /^\d{2}$/.test(d) && slug) {
                // slug 里的 / 不合法，转成 -
                const cleanSlug = slug.replace(/\//g, '-');
                const id = `${y}-${m}-${d}-${cleanSlug}`;
                return { ok: true, value: id, msg: '识别：' + id };
            }
        }

        // 尝试把所有 / 转成 - 再匹配（兼容 2026/06/28/nuonuo-0cd4cf 没去斜杠的情况）
        const collapsed = path.replace(/\//g, '-');
        if (ID_RE.test(collapsed)) {
            return { ok: true, value: collapsed, msg: '识别：' + collapsed };
        }

        return { ok: false, value: s, msg: '无法识别，请检查输入' };
    }

    function updateParsed() {
        const r = parseWhisperId(whisperInput.value);
        if (!whisperInput.value.trim()) {
            parsedHint.hidden = true;
            return;
        }
        parsedHint.hidden = false;
        if (r.ok) {
            parsedHint.textContent = r.msg;
            parsedHint.className = 'diag-hint diag-parsed';
        } else {
            parsedHint.textContent = r.msg;
            parsedHint.className = 'diag-hint diag-parsed err';
        }
    }

    // 输入时实时解析显示
    whisperInput.addEventListener('input', updateParsed);
    whisperInput.addEventListener('blur', function() {
        // 失焦时若识别成功，把输入框替换成标准格式
        const r = parseWhisperId(whisperInput.value);
        if (r.ok && r.value !== whisperInput.value) {
            whisperInput.value = r.value;
            updateParsed();
        }
    });

    // 文件选择后压缩为 WebP 并预览
    fileInput.addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) {
            previewBox.hidden = true;
            compressedBlob = null;
            return;
        }
        try {
            showStatus('压缩中...', true);
            const { blob, width, height, quality } = await compressToWebp(file);
            compressedBlob = blob;
            previewImg.src = URL.createObjectURL(blob);
            previewBox.hidden = false;
            compressInfo.textContent =
                `${file.name}：${fmtSize(file.size)} → ${fmtSize(blob.size)} ` +
                `（${width}×${height}，质量 ${quality.toFixed(1)}）`;
            statusBox.hidden = true;
        } catch (err) {
            showStatus('压缩失败：' + err.message, false);
            compressedBlob = null;
            previewBox.hidden = true;
            this.value = '';
        }
    });

    // 提交
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        statusBox.hidden = true;
        progressBox.hidden = true;
        progressFill.style.width = '0%';
        progressText.textContent = '0%';

        const secret = document.getElementById('diag-secret').value.trim();
        const parsed = parseWhisperId(whisperInput.value);
        const seq = parseInt(document.getElementById('diag-seq').value, 10) || 1;

        if (!secret) {
            showStatus('请填写令牌。', false);
            return;
        }
        if (!parsed.ok) {
            showStatus('动态识别失败，请检查输入。', false);
            return;
        }
        if (!compressedBlob) {
            showStatus('请先选择图片（等待压缩完成）。', false);
            return;
        }

        // 读取压缩后的 webp blob 为 base64
        const reader = new FileReader();
        const base64 = await new Promise((resolve, reject) => {
            reader.onload = () => {
                const result = reader.result;
                const idx = result.indexOf(',');
                resolve(idx >= 0 ? result.slice(idx + 1) : result);
            };
            reader.onerror = () => reject(new Error('文件读取失败'));
            reader.readAsDataURL(compressedBlob);
        });

        const body = {
            whisper_id: parsed.value,
            image_base64: base64,
            content_type: 'image/webp',
            seq: seq
        };
        const bodyStr = JSON.stringify(body);

        submitBtn.disabled = true;
        submitBtn.textContent = '提交中...';
        progressBox.hidden = false;

        // 用 XHR 替代 fetch，以获得上传进度（fetch API 不支持上传进度）
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/_diag/replace-image');
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('X-Diag-Secret', secret);

        xhr.upload.onprogress = function(ev) {
            if (ev.lengthComputable) {
                const pct = Math.round(ev.loaded / ev.total * 100);
                progressFill.style.width = pct + '%';
                progressText.textContent = pct + '%';
            }
        };

        try {
            const resp = await new Promise((resolve, reject) => {
                xhr.onload = () => {
                    let data = {};
                    try { data = JSON.parse(xhr.responseText); } catch (_) {}
                    resolve({ ok: xhr.status >= 200 && xhr.status < 300, data });
                };
                xhr.onerror = () => reject(new Error('网络错误'));
                xhr.send(bodyStr);
            });

            if (resp.ok && resp.data.status === 'queued') {
                showStatus('已提交，等待调度应用。', true);
                form.reset();
                previewBox.hidden = true;
                parsedHint.hidden = true;
                compressedBlob = null;
            } else {
                showStatus('提交失败：' + (resp.data.error || '未知错误'), false);
            }
        } catch (err) {
            showStatus('网络错误：' + err.message, false);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '提交';
            progressBox.hidden = true;
        }
    });
})();
</script>
{{ end }}
