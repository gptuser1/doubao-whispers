name: Whisper Runner

on:
  schedule:
    # Every hour at minute 19, UTC time. Offset :19 avoids the top-of-hour
    # GitHub Actions load spike that was delaying runs scheduled at :00.
    # The script itself enforces Beijing-time active hours (7:00-23:00).
    - cron: '19 * * * *'
  workflow_dispatch: # Allow manual trigger

# Serialize runs: only one runner at a time. Without this, a cron run and a
# manual trigger (or two overlapping crons) can both checkout the same base,
# modify the same JSON files, and then fight on push — the loser hits a
# non-fast-forward rejection and, with JSON files, a real rebase conflict it
# can't auto-resolve. Queuing (cancel-in-progress: false) lets the in-flight
# run finish cleanly so the next run checks out a base that already includes
# its changes.
concurrency:
  group: whisper-runner
  cancel-in-progress: false

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install Pillow requests

      - name: Run whisper runner
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_ZAI_API_KEY: ${{ secrets.OPENAI_ZAI_API_KEY }}
          OPENAI_OC_API_KEY: ${{ secrets.OPENAI_OC_API_KEY }}
          CF_DEFAULT_ACCOUNT_ID: ${{ secrets.CF_DEFAULT_ACCOUNT_ID }}
          CF_DEFAULT_API_TOKEN: ${{ secrets.CF_DEFAULT_API_TOKEN }}
          CF_IMAGE_ACCOUNT_ID: ${{ secrets.CF_IMAGE_ACCOUNT_ID }}
          CF_IMAGE_API_TOKEN: ${{ secrets.CF_IMAGE_API_TOKEN }}
          CF_DIAG_KV_ID: ${{ secrets.CF_DIAG_KV_ID }}
          D1_API_URL: ${{ secrets.D1_API_URL }}
          D1_API_KEY: ${{ secrets.D1_API_KEY }}
          D1_STATE_DB_ID: ${{ secrets.D1_STATE_DB_ID }}
          D1_REPLIES_DB_ID: ${{ secrets.D1_REPLIES_DB_ID }}
        run: |
          python .whisper-task/scripts/whisper_runner.py
